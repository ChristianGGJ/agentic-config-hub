site_name: Agentic Config Hub
site_description: Curated library of production-ready AI configurations for agents and agentic systems
site_url: https://ChristianGGJ.github.io/agentic-config-hub/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - attr_list
  - md_in_html

docs_dir: .

nav:
  - Home: index.md
  - "Core Agentic Design":
    - "Core Agentic Design Skills": skills/core-agentic-design/index.md
    - "Agentic System Architect": skills/core-agentic-design/agentic-system-architect.md
    - "Agent Designer": skills/core-agentic-design/agent-designer.md
    - "Agent Workflow Designer": skills/core-agentic-design/agent-workflow-designer.md
